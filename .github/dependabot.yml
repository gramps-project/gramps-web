version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      material-web:
        patterns:
          - "@material/*"
      lit:
        patterns:
          - "lit"
          - "@lit/*"
          - "lit-*"
      rollup:
        patterns:
          - "rollup"
          - "@rollup/*"
          - "rollup-*"
      d3:
        patterns:
          - "d3"
          - "d3-*"
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-*"
          - "typescript-eslint"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
